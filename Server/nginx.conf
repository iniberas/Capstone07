server {
    listen 80;
    server_name localhost;

    client_max_body_size 500M;

    # buat gamenya
    root /var/www/virtual_exhibition_webgl;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # buat video+poster
    location /assets/ {
        alias /var/www/virtual_exhibition_assets/;

        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        add_header Accept-Ranges bytes;
        expires 30d;
        add_header Cache-Control "public, no-transform";

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # buat compressionnya webgl (blom nyoba tapi)
    location ~ \.wasm\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/wasm;
    }
    location ~ \.data\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }
    location ~ \.js\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/javascript;
    }
    location ~ \.wasm\.br$ {
        add_header Content-Encoding br;
        default_type application/wasm;
    }
    location ~ \.data\.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
    }
    location ~ \.js\.br$ {
        add_header Content-Encoding br;
        default_type application/javascript;
    }

    # routing buat dashboard
    location /admin/ {
        auth_basic "Admin Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        alias /var/www/virtual_exhibition_admin/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # routing buat backend
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        limit_except GET POST {
            auth_basic "Admin API Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
    }
}