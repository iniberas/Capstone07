<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>CapstoneHub</title>

  <link rel="icon" type="image/x-icon" href="/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">


  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;

      width: 100vw;
      height: 100vh;

      max-width: calc(100vh * (960 / 600));
      max-height: calc(100vw * (600 / 960));

      background-color: #000000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background-color: #000000;
    }

    #loading-container {
      position: absolute;
      inset: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-color: #000000;

      color: white;
      font-family: sans-serif;

      z-index: 999;
    }

    .spinner {
      width: 12vmin;
      height: 12vmin;

      border: 1.5vmin solid rgba(255, 255, 255, 0.2);
      border-top: 1.5vmin solid #fff;

      border-radius: 50%;

      animation: spin 1s linear infinite;

      margin-bottom: 3vmin;
    }

    #loading-text {
      font-size: 3vmin;
      font-weight: bold;
      font-family: 'JetBrains Mono', monospace;
    }

    #mobile-message {
      display: none;
      color: white;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      font-size: 4vmin;
      padding: 20px;
      line-height: 1.5;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <div id="game-container">

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-container">
      <div class="spinner"></div>
      <div id="loading-text">Loading 0%</div>
    </div>

  </div>

  <div id="mobile-message">
    Not supported on mobile.<br>Please open this on a desktop.
  </div>


  <script src="Build/app.loader.js"></script>

  <script>
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const gameContainer = document.getElementById("game-container");
    const mobileMessage = document.getElementById("mobile-message");
    const canvas = document.querySelector("#unity-canvas");
    const loadingContainer = document.getElementById("loading-container");
    const loadingText = document.getElementById("loading-text");

    if (isMobile) {
      // Jika HP, atur viewport untuk skala teks, sembunyikan game, tampilkan pesan
      const meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content =
        "width=device-width,height=device-height,initial-scale=1.0,user-scalable=no,shrink-to-fit=yes";
      document.head.appendChild(meta);

      gameContainer.style.display = "none";
      mobileMessage.style.display = "block";


    } else {
      // Jika Desktop, muat Unity WebGL
      const config = {
        arguments: [],
        dataUrl: "Build/app.data.gz",
        frameworkUrl: "Build/app.framework.js.gz",


        codeUrl: "Build/app.wasm.gz",


        streamingAssetsUrl: "StreamingAssets",

        companyName: "Group 07",
        productName: "CapstoneHub",
        productVersion: "0.0.1"
      };

      createUnityInstance(
        canvas,
        config,
        (progress) => {
          loadingText.textContent =
            "Loading " + Math.round(progress * 100) + "%";
        }
      )
        .then((unityInstance) => {

          loadingContainer.style.display = "none";


        })
        .catch((message) => {
          alert(message);
        });
    }

  </script>

</body>
</html>
