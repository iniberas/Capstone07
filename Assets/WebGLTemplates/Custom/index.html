<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>{{{ PRODUCT_NAME }}}</title>

  <link rel="icon" type="image/x-icon" href="/icon.png">

#if SHOW_DIAGNOSTICS
  <link rel="stylesheet" href="<<<TemplateData/diagnostics.css>>>">
  <script src="<<<TemplateData/diagnostics.js>>>"></script>
#endif

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;

      width: 100vw;
      height: 100vh;

      max-width: calc(100vh * (960 / 600));
      max-height: calc(100vw * (600 / 960));

      background-color: #231f20;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background-color: #231f20;
    }

    #loading-container {
      position: absolute;
      inset: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-color: #231f20;

      color: white;
      font-family: sans-serif;

      z-index: 999;
    }

    .spinner {
      width: 12vmin;
      height: 12vmin;

      border: 1.5vmin solid rgba(255, 255, 255, 0.2);
      border-top: 1.5vmin solid #fff;

      border-radius: 50%;

      animation: spin 1s linear infinite;

      margin-bottom: 3vmin;
    }

    #loading-text {
      font-size: 3vmin;
      font-weight: bold;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

#if SHOW_DIAGNOSTICS
    #unity-footer {
      display: none;
    }
#endif
  </style>
</head>

<body>

  <div id="game-container">

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-container">
      <div class="spinner"></div>
      <div id="loading-text">Loading 0%</div>
    </div>

  </div>

#if SHOW_DIAGNOSTICS
  <div id="unity-footer">
    <img id="diagnostics-icon" src="TemplateData/webmemd-icon.png">
  </div>
#endif

  <script src="Build/{{{ LOADER_FILENAME }}}"></script>

  <script>

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      const meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content =
        "width=device-width,height=device-height,initial-scale=1.0,user-scalable=no,shrink-to-fit=yes";

      document.head.appendChild(meta);
    }

    const canvas = document.querySelector("#unity-canvas");
    const loadingContainer = document.getElementById("loading-container");
    const loadingText = document.getElementById("loading-text");

    const config = {
      arguments: [],
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",

#if USE_THREADS
      workerUrl: "Build/{{{ WORKER_FILENAME }}}",
#endif

#if USE_WASM
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
#endif

#if SYMBOLS_FILENAME
      symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif

      streamingAssetsUrl: "StreamingAssets",

      companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
      productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
      productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}}
    };

    createUnityInstance(
      canvas,
      config,
      (progress) => {
        loadingText.textContent =
          "Loading " + Math.round(progress * 100) + "%";
      }
    )
      .then((unityInstance) => {

        loadingContainer.style.display = "none";

#if SHOW_DIAGNOSTICS
        document.getElementById("diagnostics-icon").onclick = () => {
          unityDiagnostics.openDiagnosticsDiv(
            unityInstance.GetMetricsInfo
          );
        };
#endif

      })
      .catch((message) => {
        alert(message);
      });

  </script>

</body>
</html>
